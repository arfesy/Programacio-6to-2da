<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track & Field II - NES</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="product-card">
        
        <header class="product-header">
            <h1>Track & Field II</h1>
            <p class="subtitle">NES - Konami (1988)</p>
        </header>

        <div class="product-gallery">
            <div id="main-image-container">
                <img src="imagen 2.png" alt="Cartucho Track and Field II Vista Frontal" id="main-display-img">
            </div>
            
            <div class="thumbnails-container">
                <img src="imagen 2.png" alt="Cartucho Track and Field II Vista Frontal" class="thumb active">
                <img src="imagen 1.png" alt="Cartucho Track and Field II Vista Superior" class="thumb">
            </div>
        </div>

        <div class="product-info">
            <h2>Detalles del Artículo</h2>
            <p>Cartucho original para la consola Nintendo Entertainment System (NES). Edición clásica de deportes desarrollada por Konami, ideal para coleccionistas. En excelente estado estético y funcional.</p>
        </div>

        <hr class="separator">

        <footer class="social-section">
            <h3>Contáctanos</h3>
            <div id="social-links">
                <a href="https://www.facebook.com" target="_blank" class="social-icon" title="Facebook">
                    <img src="facebook.png" alt="Facebook">
                </a>
                <a href="https://www.instagram.com" target="_blank" class="social-icon" title="Instagram">
                    <img src="instagram.png" alt="Instagram">
                </a>
                <a href="https://www.tiktok.com" target="_blank" class="social-icon" title="TikTok">
                    <img src="tik-tok.png" alt="TikTok">
                </a>
                <a href="https://wa.me/123456789" target="_blank" class="social-icon" title="WhatsApp">
                    <img src="whatsapp.png" alt="WhatsApp">
                </a>
                <a href="https://www.youtube.com" target="_blank" class="social-icon" title="YouTube">
                    <img src="youtube.png" alt="YouTube">
                </a>
            </div>
        </footer>

    </div>

    <script src="script.js"></script>
</body>
</html>
